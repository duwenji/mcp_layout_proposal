apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-proxy
  namespace: mcp-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-proxy
  template:
    metadata:
      labels:
        app: mcp-proxy
    spec:
      containers:
        - name: mcp-proxy
          image: ghcr.io/your-org/mcp-layout-proxy:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          command: ["python", "run_multi_server.py"]
          args:
            - "--transport"
            - "sse"
            - "--server"
            - "mcp-postgres"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          envFrom:
            - configMapRef:
                name: mcp-proxy-config
            - secretRef:
                name: mcp-postgres-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
